<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Blog | Handwritten Letters</title>
</head>
<body>

    <!-- Shared Header Shell -->
    <div id="global-header"></div>

    <!-- Main Letter Reader Interface -->
    <main class="reader-container">
        <!-- Display Header (Filename / ID) -->
        <h2 id="letter-title" class="letter-title">Loading letters...</h2>

        <!-- Main Image Canvas Wrapper -->
        <div class="canvas-wrapper">
            <img id="letter-display" class="letter-image" src="" alt="Handwritten Letter Canvas">
        </div>

        <!-- Sticky Control Navigation Dock -->
        <div class="control-dock">
            <button id="btn-prev" class="nav-btn">&larr; Previous</button>
            <span id="letter-tracker" class="tracker-text">0 / 0</span>
            <button id="btn-next" class="nav-btn">Next &rarr;</button>
        </div>
		
		<div id="blog-archive" style="font-family: monospace; margin-top: 20px; text-align: center;"></div>
		
    </main>

    <!-- Shared Footer Shell -->
    <div id="global-footer"></div>

    <!-- Master Web Integration Script -->
    <script src="app.js"></script>

    <!-- Local Blog Reader Controller Logic -->
    <script>
        // Use a scoping block to prevent variables clashing across the app
        (async function() {
            let blogArchive = [];
            let currentIndex = 0;

            const titleEl = document.getElementById('letter-title');
            const displayEl = document.getElementById('letter-display');
            const trackerEl = document.getElementById('letter-tracker');
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');
            const archiveContainer = document.getElementById('blog-archive');

            // 1. Fetch the Index Generated by your Python Tool
            try {
                const response = await fetch('blog-list.json');
                if (!response.ok) throw new Error("Index target missing.");
                
                blogArchive = await response.json();
                
                if (blogArchive.length === 0) {
                    titleEl.textContent = "No letters published just yet.";
                    return;
                }

                // Default to the MOST RECENT letter (the last image in the array)
                
				//currentIndex = blogArchive.length - 1;
                currentIndex = 0
				buildLinksAndRender();

            } catch (err) {
                console.error("Error loading blog index configuration:", err);
                titleEl.textContent = "Unable to retrieve handwritten archive.";
            }

            // 2. DOM Rendering & Link Building Function
            function buildLinksAndRender() {
                if (!blogArchive.length) return;

                const currentLetter = blogArchive[currentIndex];
                
                // Set the title exactly to the image filename as requested
                titleEl.textContent = currentLetter.filename;
                
                // Swap the image target source instantly
                displayEl.src = currentLetter.path;
                
                // Update navigation text counter (Human readable counts start at 1)
                trackerEl.textContent = `Letter ${currentIndex + 1} of ${blogArchive.length}`;

                // Clear out the link box and rebuild it fresh
                archiveContainer.innerHTML = '';
                
                blogArchive.forEach((letter, index) => {
                    if (index === currentIndex) {
                        // FIX 1: Current viewed file is plain text, NOT a hotlink
                        const textSpan = document.createElement('span');
                        textSpan.textContent = letter.filename;
                        textSpan.style.color = "#000"; // White text so you know it's active
                        archiveContainer.appendChild(textSpan);
                    } else {
                        // Other files are clickable links
                        const link = document.createElement('a');
                        link.href = "#";
                        link.textContent = letter.filename;
                        link.style.color = "#007acc";
                        link.style.textDecoration = "underline";
                        
                        link.addEventListener('click', (e) => {
                            e.preventDefault();
                            currentIndex = index;
                            buildLinksAndRender();
                            window.scrollTo(0, 0); // FIX 2: Jump back to top
                        });
                        
                        archiveContainer.appendChild(link);
                    }
                    // Add a space between filenames
                    archiveContainer.appendChild(document.createTextNode(' '));
                });
            }

            // 3. Navigation Controls Iterators
            btnPrev.addEventListener('click', () => {
                if (currentIndex > 0) {
                    currentIndex--;
                } else {
                    currentIndex = blogArchive.length - 1; // Infinite loop back to the latest
                }
                buildLinksAndRender();
                window.scrollTo(0, 0); // FIX 2: Jump back to top
            });

            btnNext.addEventListener('click', () => {
                if (currentIndex < blogArchive.length - 1) {
                    currentIndex++;
                } else {
                    currentIndex = 0; // Infinite loop back to the oldest letter
                }
                buildLinksAndRender();
                window.scrollTo(0, 0); // FIX 2: Jump back to top
            });
        })();
    </script>
</body>
</html>
